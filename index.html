!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kalkulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
    }
    .calc {
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .calc-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      margin: 0 0 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .calc-title::before {
      content: '🧮';
      font-size: 18px;
    }
    .calc-inputs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .calc-inputs input {
      width: 100%;
      padding: 10px 12px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      color: #1a1a2e;
    }
    .calc-inputs input:focus {
      border-color: #4361ee;
    }
    .calc-ops {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-op {
      border: 1.5px solid #e0e0e0;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 11px 0;
      font-size: 18px;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Poppins', sans-serif;
    }
    .btn-op:hover {
      background: #eef0ff;
      border-color: #4361ee;
      color: #4361ee;
    }
    .btn-op:active { transform: scale(0.94); }
    .btn-op.active-op {
      background: #4361ee;
      border-color: #4361ee;
      color: #ffffff;
    }
    .result-box {
      background: #f0f3ff;
      border-radius: 12px;
      padding: 14px 16px;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 12px;
    }
    .result-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .result-value {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a2e;
      word-break: break-all;
    }
    .result-value.error {
      font-size: 14px;
      color: #e63946;
    }
    .btn-reset {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      color: #888;
      border: 1.5px solid #e0e0e0;
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-reset:hover {
      background: #f8f9fa;
      color: #333;
    }
  </style>
</head>
<body>

<div class="calc">
  <p class="calc-title">Kalkulator</p>

  <div class="calc-inputs">
    <input type="number" id="a" placeholder="" oninput="autoHitung()" />
    <input type="number" id="b" placeholder="" oninput="autoHitung()" />
  </div>

  <div class="calc-ops">
    <button class="btn-op" id="op-+" onclick="pilihOp('+')">+</button>
    <button class="btn-op" id="op--" onclick="pilihOp('−')">−</button>
    <button class="btn-op" id="op-x" onclick="pilihOp('×')">×</button>
    <button class="btn-op" id="op-d" onclick="pilihOp('÷')">÷</button>
  </div>

  <div class="result-box">
    <div class="result-label">Hasil</div>
    <div class="result-value" id="hasil">—</div>
  </div>

  <button class="btn-reset" onclick="reset()">↺ Reset</button>
</div>

<script>
  let opAktif = null;
  const opMap = { '+': '+', '−': '-', '×': '*', '÷': '/' };
  const opIds = { '+': 'op-+', '−': 'op--', '×': 'op-x', '÷': 'op-d' };

  function pilihOp(op) {
    opAktif = op;
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    document.getElementById(opIds[op]).classList.add('active-op');
    autoHitung();
  }

  function autoHitung() {
    if (!opAktif) return;
    const aVal = document.getElementById('a').value;
    const bVal = document.getElementById('b').value;
    if (aVal === '' || bVal === '') {
      document.getElementById('hasil').textContent = '—';
      return;
    }
    const a = parseFloat(aVal);
    const b = parseFloat(bVal);
    const op = opMap[opAktif];
    let hasil;
    if (op === '+') hasil = a + b;
    else if (op === '-') hasil = a - b;
    else if (op === '*') hasil = a * b;
    else {
      if (b === 0) { tampilError('Tidak bisa dibagi nol'); return; }
      hasil = a / b;
    }
    const el = document.getElementById('hasil');
    el.className = 'result-value';
    el.textContent = parseFloat(hasil.toFixed(10)).toString();
  }

  function tampilError(msg) {
    const el = document.getElementById('hasil');
    el.className = 'result-value error';
    el.textContent = msg;
  }

  function reset() {
    document.getElementById('a').value = '';
    document.getElementById('b').value = '';
    document.getElementById('hasil').className = 'result-value';
    document.getElementById('hasil').textContent = '—';
    document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active-op'));
    opAktif = null;
  }
</script>

</body>
</html>
